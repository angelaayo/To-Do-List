<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="main">
        <div id="sidebar">
            <div class="sidebarNav">
                <div class="header">App Name</div>
                <ul class="navOption">
                    <li id="Home"class="selectedBtn navBtn">Home</li>
                    <li id="Today"class="navBtn">Today</li>
                    <ul id="projectBtn" class="navBtn">Project
                        
                    </ul>
                </ul>
            </div>
            <div class="greeting">
                <div>Welcome</div>
            </div>
        </div>
        <div id="content">
            <div id="contentHeader" class="header">Home</div>
            <div class="contentNav">
                <span id="taskBtn"class="selectedTxt navTxt">Tasks</span>
                <span class="navTxt completedBtn">Completed</span>
            </div>
            <div id="todoContent">
                
            </div>
            <div>
                <button class="addBtn">+ Add Task</button>
            </div>
        </div>
    </main>
    <div id="overlay">
        <div id="popUp" class="hidden">
            <div class="formHeader">Add new task</div>
            <form id="taskForm">
                <label for="taskTitle">Task Title</label>
                <input id="taskTitle" type="text" required placeholder="Enter task title...">
                <label for="taskPriority">Priority</label>
                <div role="radiogroup" id="taskPriority">
                    <label class="High">High
                        <input type="radio" name="priority" value="High">
                    </label>
                     <label class="Medium">Medium
                        <input type="radio" name="priority" value="Medium">
                    </label>
                    <label class="Low">Low
                        <input type="radio" name="priority" value="Low">
                    </label>
                </div>
                <div class="errorMsg hidden">Please Select a priority</div>
                <label for="taskDate">Due Date</label>
                <div class="dateContainer">
                    <input id="taskDate" type="date" required>
                    <span>Due Date:</span>
                </div>
                <label for="taskProject">Project Group</label>
                <select id="taskProject" required>
                    <option value="" disabled selected>Select Project</option>
                    <option value="new" >Create New Project</option>
                </select>
                <label for="taskDescription">Description</label>
                <textarea id="taskDescription" name="taskDescription" placeholder="Add a description..." rows="4"></textarea>
                <div class="formOption">
                    <button id="formCancelBtn">Cancel</button>
                    <button id="formSubmitBtn" type="submit">Add Task</button>
                </div>
            </form>
            <form id="addProject" class="hidden">
                <label for="newProjectInput">Project Name</label>
                <div>
                    <input id="newProjectInput"type="text" required placeholder="Enter Project Name">
                    <button id="addProjectBtn">Add Project</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
