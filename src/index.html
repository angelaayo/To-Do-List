<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="main">
        <div id="sidebar">
            <div class="sidebarNav">
                <div class="header">App Name</div>
                <ul class="navOption">
                    <li class="selectedBtn">Home</li>
                    <li class="navBtn">Today</li>
                    <ul id="projectBtn" class="navBtn">Project
                        
                    </ul>
                </ul>
            </div>
            <div class="greeting">
                <div>Welcome</div>
            </div>
        </div>
        <div id="content">
            <div id="contentHeader" class="header">Home</div>
            <div class="contentNav">
                <span class="selectedTxt">Tasks</span>
                <span class="navTxt">Completed</span>
            </div>
            <div class="todoContent">
                <div class="card">
                    <div class="overview">
                        <div class="priority"></div>
                        <div class="title"></div>
                        <div class="interactive">
                            <div class="dotsBtn"></span>
                            <div class="markComplete"></span>
                        </div>
                    </div>
                    <div class="classification">
                        <div class="dueDate"></span>
                        <div class="projectGroup"></span>
                    </div>
                    <div class="taskDescriptor"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
